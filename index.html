<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งซ่อม - สถาบันราชประชาสมาสัย</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        /* ⭐️ การตั้งค่าพื้นฐาน ⭐️ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f4f7f6 0%, #e0e8e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        /* ⭐️ กล่องเมนูหลัก ⭐️ */
        .container {
            background: #fff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        
        .logo-icon {
            font-size: 4rem;
            color: #0A6E31;
            margin-bottom: 15px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0A6E31;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 40px;
        }

        /* ⭐️ ปุ่มกด (Buttons) ⭐️ */
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-service {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-service i {
            margin-right: 15px;
            font-size: 1.8rem;
        }

        /* สีปุ่มแจ้งซ่อมไฟฟ้า (สีส้ม/เหลือง) */
        .btn-electrical {
            background: linear-gradient(135deg, #f39c12 0%, #d35400 100%);
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.3);
        }
        .btn-electrical:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(211, 84, 0, 0.4);
        }

        /* สีปุ่มแจ้งซ่อมคอมพิวเตอร์ (สีเขียว RPSI) */
        .btn-it {
            background: linear-gradient(135deg, #0A6E31 0%, #064d22 100%);
            box-shadow: 0 8px 20px rgba(10, 110, 49, 0.3);
        }
        .btn-it:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(10, 110, 49, 0.4);
        }

        /* ⭐️ หน้าจอ Loading (ซ่อนไว้เป็นค่าเริ่มต้น) ⭐️ */
        #loading-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #0A6E31;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0A6E31;
            margin-bottom: 10px;
        }

        .loading-subtext {
            font-size: 1rem;
            color: #666;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="main-menu">
            <i class="fas fa-hospital-user logo-icon"></i>
            <h1 class="title">ระบบแจ้งปัญหาการใช้งาน</h1>
            <p class="subtitle">สถาบันราชประชาสมาสัย (RPSI Helpdesk)<br/>กรุณาเลือกระบบที่ท่านต้องการแจ้งซ่อม</p>
            
            <div class="btn-grid">
                <button class="btn-service btn-electrical" onclick="navigateTo(
                    'https://rajpracha.ddc.moph.go.th/Rpsi_pages/faifar/index.aspx', 
                    'http://10.10.5.103/Rpsi_pages/faifar/index.aspx'
                )">
                    <i class="fas fa-bolt"></i> แจ้งซ่อมระบบไฟฟ้า ประปา อาคารสถานที่ อื่นๆ
                </button>

                <button class="btn-service btn-it" onclick="navigateTo(
                    'https://rajpracha.ddc.moph.go.th/Rpsi_pages/it/index.aspx', 
                    'http://10.10.5.103/Rpsi_pages/it/index.aspx'
                )">
                    <i class="fas fa-laptop-medical"></i> แจ้งปัญหาการใช้งานคอมพิวเตอร์
                </button>
            </div>
        </div>

        <div id="loading-screen">
            <div class="loader"></div>
            <div class="loading-text">กำลังตรวจสอบเส้นทางเครือข่าย...</div>
            <div class="loading-subtext">ระบบกำลังเชื่อมต่อ กรุณารอสักครู่</div>
        </div>

    </div>

    <script>
        async function navigateTo(targetUrl, fallbackUrl) {
            // 1. ซ่อนเมนูหลัก และแสดงหน้า Loading
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';

            // 2. ตั้งเวลา Timeout ไว้ที่ 3.5 วินาที (3500 มิลลิวินาที)
            const timeout = (ms) => new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), ms));

            try {
                // 3. วิ่งแข่งกันระหว่าง Fetch (เคาะประตู Domain ภายนอก) กับ ตัวจับเวลา Timeout
                await Promise.race([
                    fetch(targetUrl, {
                        method: 'HEAD',      // ใช้ HEAD เพื่อดึงข้อมูลให้น้อยและเร็วที่สุด
                        mode: 'no-cors',     // ป้องกันเบราว์เซอร์บล็อกเรื่อง Cross-Origin
                        cache: 'no-store'    // ไม่ให้จำแคช เพื่อเช็คสัญญาณแบบ Real-time
                    }),
                    timeout(3500)
                ]);

                // 4. ถ้าผ่าน (อยู่ในเครือข่ายภายนอกที่มองเห็น Domain) ให้เข้าลิงก์หลัก
                window.location.href = targetUrl;
            } catch (e) {
                // 5. ถ้าเกิด Error (เช่น ไม่ได้ต่อเน็ตภายนอก) หรือ หมดเวลา (Timeout) ให้เด้งเข้าลิงก์ IP ภายใน
                window.location.href = fallbackUrl;
            }
        }
    </script>
</body>
</html>
