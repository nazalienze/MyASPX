<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งซ่อม - สถาบันราชประชาสมาสัย</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        /* ⭐️ การตั้งค่าพื้นฐาน ⭐️ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f4f7f6 0%, #e0e8e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        /* ⭐️ กล่องเมนูหลัก ⭐️ */
        .container {
            background: #fff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        
        .logo-icon {
            font-size: 4rem;
            color: #0A6E31;
            margin-bottom: 15px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0A6E31;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 40px;
        }

        /* ⭐️ ปุ่มกด (Buttons) ⭐️ */
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-service {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-service i {
            margin-right: 15px;
            font-size: 1.8rem;
        }

        .btn-electrical {
            background: linear-gradient(135deg, #f39c12 0%, #d35400 100%);
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.3);
        }
        .btn-electrical:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(211, 84, 0, 0.4);
        }

        .btn-it {
            background: linear-gradient(135deg, #0A6E31 0%, #064d22 100%);
            box-shadow: 0 8px 20px rgba(10, 110, 49, 0.3);
        }
        .btn-it:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(10, 110, 49, 0.4);
        }

        /* ⭐️ หน้าจอ Loading ⭐️ */
        #loading-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #0A6E31;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0A6E31;
            margin-bottom: 10px;
        }

        .countdown-text {
            font-size: 2rem;
            font-weight: 700;
            color: #d35400;
            margin: 15px 0;
        }

        .loading-subtext {
            font-size: 1rem;
            color: #666;
        }

        /* ⭐️ หน้าจอ Error ⭐️ */
        #error-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .error-icon {
            font-size: 4rem;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        .error-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .error-subtext {
            font-size: 1rem;
            color: #666;
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .btn-action {
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
        }

        .btn-retry {
            background: #0A6E31;
        }
        .btn-retry:hover { background: #064d22; }

        .btn-back {
            background: #666;
        }
        .btn-back:hover { background: #444; }

    </style>
</head>
<body>

    <div class="container">
        
        <div id="main-menu">
            <i class="fas fa-hospital-user logo-icon"></i>
            <h1 class="title">ระบบแจ้งปัญหาการใช้งาน</h1>
            <p class="subtitle">สถาบันราชประชาสมาสัย (RPSI Helpdesk)<br/>กรุณาเลือกระบบที่ท่านต้องการแจ้งซ่อม</p>
            
            <div class="btn-grid">
                <button type="button" class="btn-service btn-electrical" onclick="startNavigation(
                    'https://rajpracha.ddc.moph.go.th/Rpsi_pages/faifar/index.aspx', 
                    'http://10.10.5.103/Rpsi_pages/faifar/index.aspx'
                )">
                    <i class="fas fa-bolt"></i> แจ้งซ่อมระบบไฟฟ้า ประปา ซ่อมบำรุง
                </button>

                <button type="button" class="btn-service btn-it" onclick="startNavigation(
                    'https://rajpracha.ddc.moph.go.th/Rpsi_pages/it/index.aspx', 
                    'http://10.10.5.103/Rpsi_pages/it/index.aspx'
                )">
                    <i class="fas fa-laptop-medical"></i> แจ้งซ่อมคอมพิวเตอร์
                </button>
            </div>
        </div>

        <div id="loading-screen">
            <div class="loader"></div>
            <div class="loading-text" id="loading-title">กำลังนำท่านเข้าสู่ระบบ...</div>
            <div class="countdown-text" id="loading-timer">5</div>
            <div class="loading-subtext" id="loading-desc">กรุณารอสักครู่</div>
        </div>

        <div id="error-screen">
            <i class="fas fa-wifi error-icon" style="color: #e74c3c; font-size: 4rem; margin-bottom: 15px;"></i>
            <div class="error-text">ไม่สามารถเชื่อมต่อระบบได้ในขณะนี้</div>
            <div class="error-subtext">ไม่พบเส้นทางการเชื่อมต่อทั้งภายในและภายนอก<br/>กรุณาตรวจสอบอินเทอร์เน็ตของท่าน หรือลองใหม่อีกครั้ง</div>
            
            <div class="action-buttons">
                <button class="btn-action btn-retry" onclick="retryNavigation()">
                    <i class="fas fa-redo"></i> ลองใหม่อีกครั้ง
                </button>
                <button class="btn-action btn-back" onclick="resetMenu()">
                    <i class="fas fa-home"></i> กลับหน้าหลัก
                </button>
            </div>
        </div>

    </div>

    <script>
        // ตัวแปรเก็บค่าเผื่อกรณี User กด "ลองใหม่อีกครั้ง"
        let currentTargetUrl = "";
        let currentFallbackUrl = "";
        let countdownInterval;

        function resetMenu() {
            clearInterval(countdownInterval);
            document.getElementById('error-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        }

        function startNavigation(targetUrl, fallbackUrl) {
            currentTargetUrl = targetUrl;
            currentFallbackUrl = fallbackUrl;
            executeNavigation();
        }

        function retryNavigation() {
            executeNavigation();
        }

        function executeNavigation() {
            // ซ่อนหน้าอื่น แสดงหน้า Loading
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('error-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';

            const textTitle = document.getElementById('loading-title');
            const textDesc = document.getElementById('loading-desc');
            const textTimer = document.getElementById('loading-timer');

            let isNavigating = false;

            // พาย้ายหน้าเว็บ
            function go(url) {
                if (!isNavigating) {
                    isNavigating = true;
                    clearInterval(countdownInterval);
                    window.location.href = url;
                }
            }

            // ฟังก์ชันตรวจสอบเครือข่ายด้วย Fetch API แบบจับเวลา
            function checkConnection(url, stepName, onSuccess, onFail) {
                if (isNavigating) return;

                let timeLeft = 5;
                textTitle.innerText = `กำลังตรวจสอบการเชื่อมต่อ...`;
                textDesc.innerText = `พยายามเชื่อมต่อผ่าน: ${stepName}`;
                textTimer.innerText = timeLeft;

                clearInterval(countdownInterval);
                
                // เริ่มนับถอยหลังหน้าจอ
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft >= 0) {
                        textTimer.innerText = timeLeft;
                    }
                }, 1000);

                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort(); // ยกเลิกการดึงข้อมูลเมื่อครบ 5 วิ
                }, 5000);

                // ใช้ fetch โหมด no-cors เพื่อเช็คว่า Network เข้าถึงได้หรือไม่โดยไม่สนกฏข้ามโดเมน
                fetch(url, { mode: 'no-cors', cache: 'no-store', signal: controller.signal })
                    .then(() => {
                        // ถ้า fetch สำเร็จ (ตอบกลับมาแม้จะเป็น 404) แปลว่าเน็ตวิ่งไปถึงเซิร์ฟเวอร์
                        clearTimeout(timeoutId);
                        clearInterval(countdownInterval);
                        onSuccess();
                    })
                    .catch(err => {
                        // ถ้า fetch พัง (เช่น timeout, เน็ตตัด, ไม่มีเส้นทาง IP)
                        clearTimeout(timeoutId);
                        clearInterval(countdownInterval);
                        onFail();
                    });
            }

            // ลำดับการทำงาน
            // ขั้นที่ 1: ลอง IP ภายใน (5 วินาที)
            function step1() {
                checkConnection(currentFallbackUrl, "เครือข่ายภายใน (10.10.5.103)", 
                    () => go(currentFallbackUrl), 
                    step2 // ถ้า 5 วิไม่สำเร็จ ไปขั้น 2
                );
            }

            // ขั้นที่ 2: ลอง Domain ภายนอก (5 วินาที)
            function step2() {
                checkConnection(currentTargetUrl, "เครือข่ายภายนอก (โดเมนหลัก)", 
                    () => go(currentTargetUrl), 
                    showError // ถ้า 5 วิไม่สำเร็จ ไปหน้า Error
                );
            }

            // ขั้นที่ 3: แสดงหน้า Error
            function showError() {
                if (isNavigating) return;
                clearInterval(countdownInterval);
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('error-screen').style.display = 'flex';
            }

            // เริ่มทำงานที่ขั้นที่ 1
            step1();
        }
    </script>
</body>
</html>
