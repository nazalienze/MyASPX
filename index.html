<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งปัญหา - สถาบันราชประชาสมาสัย</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        /* ⭐️ การตั้งค่าพื้นฐานและพื้นหลัง ⭐️ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        /* ⭐️ กล่องเมนูหลัก (ใส่ลูกเล่น Glassmorphism เบาๆ) ⭐️ */
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: fadeIn 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-icon {
            font-size: 4.5rem;
            color: #0A6E31;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 6px rgba(10, 110, 49, 0.2));
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #666;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* ⭐️ ปุ่มกด (Buttons) ⭐️ */
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn-service {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 30px;
            border-radius: 16px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-service i {
            margin-right: 15px;
            font-size: 1.6rem;
        }

        /* สีปุ่มแจ้งซ่อมไฟฟ้า (ส้มสว่าง-ส้มเข้ม) */
        .btn-electrical {
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
            box-shadow: 0 8px 20px rgba(245, 124, 0, 0.25);
        }
        .btn-electrical:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(245, 124, 0, 0.35);
        }

        /* สีปุ่มแจ้งซ่อมคอมพิวเตอร์ (เขียว RPSI สว่าง-เขียวเข้ม) */
        .btn-it {
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.25);
        }
        .btn-it:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(46, 125, 50, 0.35);
        }

        /* 🔥 สีปุ่มระบบครุภัณฑ์ (น้ำเงินสว่าง-น้ำเงินเข้ม) */
        .btn-asset {
            background: linear-gradient(135deg, #0277BD 0%, #01579B 100%);
            box-shadow: 0 8px 20px rgba(1, 87, 155, 0.25);
        }
        .btn-asset:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(1, 87, 155, 0.35);
        }

        /* ⭐️ ส่วนข้อความติดต่อเบอร์ 1405 ⭐️ */
        .footer-contact {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px dashed #d1d8e0;
            font-size: 0.95rem;
            color: #7f8fa6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 400;
        }

        .footer-contact i {
            color: #e1b12c;
            font-size: 1.1rem;
            animation: ring 2s infinite ease-in-out;
        }

        .footer-contact strong {
            color: #2c3e50;
            font-weight: 600;
        }

        @keyframes ring {
            0%, 100% { transform: rotate(0deg); }
            10%, 30%, 50% { transform: rotate(-15deg); }
            20%, 40% { transform: rotate(15deg); }
            60% { transform: rotate(0deg); }
        }

        /* ⭐️ หน้าจอ Loading และวงกลมนับถอยหลัง ⭐️ */
        #loading-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .loader-wrapper {
            position: relative;
            width: 75px;
            height: 75px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 6px solid #f0f3f5;
            border-top: 6px solid #0A6E31;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-sizing: border-box;
        }

        .countdown-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0A6E31;
            z-index: 2;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .loading-subtext {
            font-size: 1rem;
            color: #7f8fa6;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="main-menu">
            <i class="fas fa-hospital-user logo-icon"></i>
            <h1 class="title">ระบบแจ้งปัญหาการใช้งาน</h1>
            <p class="subtitle">สถาบันราชประชาสมาสัย (RPSI Helpdesk)<br/>กรุณาเลือกระบบที่ท่านต้องการดำเนินการ</p>
            
            <div class="btn-grid">
                <button class="btn-service btn-electrical" onclick="navigateTo(
                    'https://rajpracha.ddc.moph.go.th/Rpsi_pages/faifar/index.aspx', 
                    'http://10.10.5.103/Rpsi_pages/faifar/index.aspx'
                )">
                    <i class="fas fa-bolt"></i> แจ้งปัญหาระบบไฟฟ้า ประปา อาคาร อื่นๆ
                </button>

                <button class="btn-service btn-it" onclick="navigateTo(
                    'https://rajpracha.ddc.moph.go.th/Rpsi_pages/it/index.aspx', 
                    'http://10.10.5.103/Rpsi_pages/it/index.aspx'
                )">
                    <i class="fas fa-laptop-medical"></i> แจ้งปัญหาระบบคอมพิวเตอร์
                </button>

                <button class="btn-service btn-asset" onclick="navigateTo(
                    'https://rajpracha.ddc.moph.go.th/Rpsi_pages/rpsiasset/index.aspx', 
                    'http://10.10.5.103/Rpsi_pages/rpsiasset/index.aspx'
                )">
                    <i class="fas fa-boxes"></i> ระบบบริหารจัดการครุภัณฑ์ (ช่วงทดสอบระบบ)
                </button>
            </div>

            <div class="footer-contact">
                <i class="fas fa-phone-alt"></i>
                <span>หากไม่สามารถเข้าระบบได้ กรุณาติดต่อเบอร์ภายใน <strong>1405</strong></span>
            </div>
        </div>

        <div id="loading-screen">
            <div class="loader-wrapper">
                <div class="loader"></div>
                <div class="countdown-number" id="countdown">10</div>
            </div>
            <div class="loading-text">กำลังตรวจสอบเส้นทางเครือข่าย...</div>
            <div class="loading-subtext">ระบบกำลังเชื่อมต่อ... กรุณารอสักครู่...</div>
        </div>

    </div>

    <script>
        async function navigateTo(targetUrl, fallbackUrl) {
            // 1. ซ่อนเมนู และโชว์หน้าโหลด
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';

            // 2. จัดการตัวเลขแสดงผล (เริ่มที่ 10)
            let count = 10;
            const countDisplay = document.getElementById('countdown');
            countDisplay.innerText = count;
            
            const timerInterval = setInterval(() => {
                count--;
                if (count >= 0) {
                    countDisplay.innerText = count;
                }
            }, 1000);

            // 3. ตรวจสอบเน็ตเวิร์ก
            const timeout = (ms) => new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), ms));

            try {
                await Promise.race([
                    fetch(targetUrl, {
                        method: 'HEAD',
                        mode: 'no-cors',
                        cache: 'no-store'
                    }),
                    timeout(3500)
                ]);

                clearInterval(timerInterval);
                window.location.href = targetUrl;
            } catch (e) {
                clearInterval(timerInterval);
                window.location.href = fallbackUrl;
            }
        }
    </script>
</body>
</html>
