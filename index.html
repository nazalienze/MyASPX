<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งซ่อม - สถาบันราชประชาสมาสัย</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        /* ⭐️ การตั้งค่าพื้นฐาน ⭐️ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f4f7f6 0%, #e0e8e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        /* ⭐️ กล่องเมนูหลัก ⭐️ */
        .container {
            background: #fff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        
        .logo-icon {
            font-size: 4rem;
            color: #0A6E31;
            margin-bottom: 15px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0A6E31;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 40px;
        }

        /* ⭐️ ปุ่มกด (Buttons) ⭐️ */
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-service {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-service i {
            margin-right: 15px;
            font-size: 1.8rem;
        }

        .btn-electrical {
            background: linear-gradient(135deg, #f39c12 0%, #d35400 100%);
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.3);
        }
        .btn-electrical:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(211, 84, 0, 0.4);
        }

        .btn-it {
            background: linear-gradient(135deg, #0A6E31 0%, #064d22 100%);
            box-shadow: 0 8px 20px rgba(10, 110, 49, 0.3);
        }
        .btn-it:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(10, 110, 49, 0.4);
        }

        /* ⭐️ หน้าจอ Loading ⭐️ */
        #loading-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #0A6E31;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0A6E31;
            margin-bottom: 10px;
        }

        .loading-subtext {
            font-size: 1rem;
            color: #666;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* ⭐️ หน้าจอ Error ⭐️ */
        #error-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .error-icon {
            font-size: 4rem;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        .error-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .error-subtext {
            font-size: 1rem;
            color: #666;
            margin-bottom: 30px;
        }

        .btn-back {
            background: #666;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="main-menu">
            <i class="fas fa-hospital-user logo-icon"></i>
            <h1 class="title">ระบบแจ้งปัญหาการใช้งาน</h1>
            <p class="subtitle">สถาบันราชประชาสมาสัย (RPSI Helpdesk)<br/>กรุณาเลือกระบบที่ท่านต้องการแจ้งซ่อม</p>
            
            <div class="btn-grid">
                <button type="button" class="btn-service btn-electrical" onclick="navigateTo(
                    'https://rajpracha.ddc.moph.go.th/Rpsi_pages/faifar/index.aspx', 
                    'http://10.10.5.103/Rpsi_pages/faifar/index.aspx'
                )">
                    <i class="fas fa-bolt"></i> แจ้งซ่อมระบบไฟฟ้า ประปา ซ่อมบำรุง
                </button>

                <button type="button" class="btn-service btn-it" onclick="navigateTo(
                    'https://rajpracha.ddc.moph.go.th/Rpsi_pages/it/index.aspx', 
                    'http://10.10.5.103/Rpsi_pages/it/index.aspx'
                )">
                    <i class="fas fa-laptop-medical"></i> แจ้งซ่อมคอมพิวเตอร์
                </button>
            </div>
        </div>

        <div id="loading-screen">
            <div class="loader"></div>
            <div class="loading-text" id="loading-title">กำลังนำท่านเข้าสู่ระบบ...</div>
            <div class="loading-subtext" id="loading-desc">กรุณารอสักครู่</div>
        </div>

        <div id="error-screen">
            <i class="fas fa-exclamation-triangle error-icon"></i>
            <div class="error-text">ไม่สามารถเชื่อมต่อระบบได้ในขณะนี้</div>
            <div class="error-subtext">ไม่พบเส้นทางการเชื่อมต่อทั้งภายในและภายนอก<br/>กรุณาตรวจสอบอินเทอร์เน็ตของท่าน หรือลองใหม่อีกครั้ง</div>
            <button class="btn-back" onclick="resetMenu()">
                <i class="fas fa-undo"></i> กลับหน้าหลัก
            </button>
        </div>

    </div>

    <script>
        function resetMenu() {
            document.getElementById('error-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        }

        function navigateTo(targetUrl, fallbackUrl) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('error-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';

            let isNavigating = false;
            const textTitle = document.getElementById('loading-title');
            const textDesc = document.getElementById('loading-desc');

            // ฟังก์ชันสำหรับพาย้ายหน้าเว็บ
            function go(url) {
                if (!isNavigating) {
                    isNavigating = true;
                    window.location.href = url;
                }
            }

            // ฟังก์ชันกลางสำหรับเช็ค URL (ตั้งเวลา timeout 5 วินาที)
            function checkConnection(testUrlPath, onSuccess, onFail) {
                if (isNavigating) return;

                const domain = new URL(testUrlPath).origin;
                const testImgUrl = domain + '/favicon.ico?t=' + new Date().getTime();
                const img = new Image();
                let isResolved = false;

                // กำหนดเวลา 5 วินาที
                const timer = setTimeout(function() {
                    if (!isResolved) {
                        isResolved = true;
                        img.src = ""; // ยกเลิกการโหลดรูป
                        onFail();
                    }
                }, 5000);

                img.onload = function() {
                    if (!isResolved) {
                        isResolved = true;
                        clearTimeout(timer);
                        onSuccess();
                    }
                };

                img.onerror = function() {
                    if (!isResolved) {
                        isResolved = true;
                        clearTimeout(timer);
                        onFail();
                    }
                };

                img.src = testImgUrl;
            }

            // ขั้นตอนที่ 1: ลอง IP ภายในก่อน (10.10.5.103)
            function step1() {
                textTitle.innerText = "กำลังตรวจสอบเครือข่ายภายใน...";
                textDesc.innerText = "ใช้เวลาประมาณ 5 วินาที";
                checkConnection(fallbackUrl, 
                    () => go(fallbackUrl), // สำเร็จ
                    step2                  // ล้มเหลว ไปขั้น 2
                );
            }

            // ขั้นตอนที่ 2: ลองโดเมนภายนอก
            function step2() {
                textTitle.innerText = "กำลังตรวจสอบเครือข่ายภายนอก...";
                textDesc.innerText = "ใช้เวลาประมาณ 5 วินาที";
                checkConnection(targetUrl, 
                    () => go(targetUrl),   // สำเร็จ
                    step3                  // ล้มเหลว ไปขั้น 3
                );
            }

            // ขั้นตอนที่ 3: วนกลับมาลอง IP ภายในอีกครั้ง
            function step3() {
                textTitle.innerText = "กำลังพยายามเชื่อมต่ออีกครั้ง...";
                textDesc.innerText = "ใช้เวลาประมาณ 5 วินาที";
                checkConnection(fallbackUrl, 
                    () => go(fallbackUrl), // สำเร็จ
                    showError              // ล้มเหลว แสดง Error
                );
            }

            // ขั้นตอนที่ 4: แสดง Error
            function showError() {
                if (isNavigating) return;
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('error-screen').style.display = 'flex';
            }

            // เริ่มต้นการทำงานที่ขั้น 1
            step1();
        }
    </script>
</body>
</html>
